<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AI Агент</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@300;400;600&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #080810;
  --surface: #0f0f1a;
  --card: #141424;
  --border: #1f1f35;
  --accent: #6c5ce7;
  --accent2: #a855f7;
  --green: #00d4aa;
  --red: #ff4757;
  --text: #e8e8f5;
  --muted: #4a4a6a;
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html, body { height:100%; overflow:hidden; }
body {
  font-family: 'JetBrains Mono', monospace;
  background: var(--bg);
  color: var(--text);
  display: flex;
  flex-direction: column;
  height: 100vh;
}

/* Фоновая сетка */
body::before {
  content:'';
  position:fixed; inset:0;
  background:
    radial-gradient(ellipse 60% 40% at 20% 0%, rgba(108,92,231,0.08) 0%, transparent 60%),
    radial-gradient(ellipse 50% 30% at 80% 100%, rgba(168,85,247,0.06) 0%, transparent 60%);
  pointer-events:none; z-index:0;
}

/* HEADER */
.header {
  display:flex; align-items:center; justify-content:space-between;
  padding: 14px 18px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  position: relative; z-index: 10; flex-shrink: 0;
}
.header-left { display:flex; align-items:center; gap:10px; }
.logo {
  width:34px; height:34px; border-radius:10px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  display:flex; align-items:center; justify-content:center;
  font-family:'Unbounded',sans-serif; font-size:12px; font-weight:600; color:white;
}
.title { font-family:'Unbounded',sans-serif; font-size:13px; font-weight:400; color:var(--text); }
.status-dot {
  width:7px; height:7px; border-radius:50%; background:var(--green);
  box-shadow:0 0 8px var(--green); animation: pulse-dot 2s ease-in-out infinite;
}
@keyframes pulse-dot { 0%,100%{opacity:1} 50%{opacity:0.4} }

.header-right { display:flex; align-items:center; gap:10px; }
.badge {
  font-size:9px; letter-spacing:.15em; padding:4px 10px;
  border:1px solid var(--accent); color:var(--accent); border-radius:20px;
  font-family:'Unbounded',sans-serif;
}
.tts-toggle { display:flex; align-items:center; gap:6px; cursor:pointer; }
.tts-label { font-size:9px; color:var(--muted); letter-spacing:.1em; }
.sw { width:32px; height:18px; border-radius:9px; background:var(--accent); position:relative; transition:background .2s; }
.sw.off { background:var(--border); }
.sw::after {
  content:''; position:absolute; width:14px; height:14px; border-radius:50%;
  background:white; top:2px; left:16px; transition:left .2s;
}
.sw.off::after { left:2px; }

/* CHAT */
.chat {
  flex:1; overflow-y:auto; padding:16px 16px 8px;
  display:flex; flex-direction:column; gap:12px;
  position:relative; z-index:1;
  scrollbar-width:none;
}
.chat::-webkit-scrollbar { display:none; }

.msg { max-width:85%; animation: msg-in .2s ease; word-break:break-word; }
@keyframes msg-in { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }

.msg.user {
  align-self:flex-end;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  padding:10px 14px; border-radius:16px 16px 4px 16px;
  font-size:14px; line-height:1.5; color:white;
}
.msg.bot {
  align-self:flex-start;
  background: var(--card);
  border:1px solid var(--border);
  padding:12px 14px; border-radius:16px 16px 16px 4px;
  font-size:14px; line-height:1.6;
}
.msg.bot.speaking {
  border-color:var(--green);
  box-shadow:0 0 16px rgba(0,212,170,0.15);
}
.msg-label {
  font-size:8px; letter-spacing:.2em; color:var(--accent);
  margin-bottom:6px; font-family:'Unbounded',sans-serif;
}

/* Typing indicator */
.typing {
  align-self:flex-start;
  background:var(--card); border:1px solid var(--border);
  padding:14px 18px; border-radius:16px 16px 16px 4px;
  display:flex; gap:5px; align-items:center;
}
.typing span {
  width:5px; height:5px; border-radius:50%; background:var(--accent);
  animation: bounce .9s ease-in-out infinite;
}
.typing span:nth-child(2){animation-delay:.15s;background:var(--accent2)}
.typing span:nth-child(3){animation-delay:.3s}
@keyframes bounce{0%,60%,100%{transform:translateY(0);opacity:.3}30%{transform:translateY(-5px);opacity:1}}

/* CONTROLS */
.controls {
  padding:12px 18px 24px;
  background:var(--surface); border-top:1px solid var(--border);
  display:flex; flex-direction:column; align-items:center; gap:14px;
  position:relative; z-index:10; flex-shrink:0;
}

/* Waveform */
.wave { display:flex; align-items:center; gap:3px; height:28px; opacity:0; transition:opacity .3s; }
.wave.show { opacity:1; }
.wb {
  width:3px; border-radius:2px; min-height:3px;
  background:linear-gradient(to top, var(--accent), var(--accent2));
  animation:wv .5s ease-in-out infinite;
}
.wb:nth-child(1){animation-delay:0s}.wb:nth-child(2){animation-delay:.08s}
.wb:nth-child(3){animation-delay:.16s}.wb:nth-child(4){animation-delay:.04s}
.wb:nth-child(5){animation-delay:.12s}.wb:nth-child(6){animation-delay:.2s}
.wb:nth-child(7){animation-delay:.08s}.wb:nth-child(8){animation-delay:.16s}
@keyframes wv{0%,100%{height:3px}50%{height:22px}}

/* ORB */
.orb-wrap { position:relative; width:76px; height:76px; display:flex; align-items:center; justify-content:center; }
.ring {
  position:absolute; border-radius:50%; border:1px solid transparent;
}
.ring:nth-child(1) { width:76px; height:76px; border-top-color:var(--accent); animation:spin 4s linear infinite; }
.ring:nth-child(2) { width:60px; height:60px; border-right-color:var(--accent2); animation:spin 2.5s linear infinite reverse; }
@keyframes spin{to{transform:rotate(360deg)}}

.orb {
  width:52px; height:52px; border-radius:50%;
  background:linear-gradient(135deg, var(--accent), var(--accent2));
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; border:none; outline:none;
  box-shadow:0 0 24px rgba(108,92,231,.4);
  transition:transform .15s, box-shadow .15s;
  position:relative; z-index:2;
}
.orb:active { transform:scale(.9); }
.orb.recording { background:linear-gradient(135deg,var(--red),#ff6b81); animation:orb-pulse 1s ease-in-out infinite; }
.orb.processing { background:linear-gradient(135deg,var(--muted),var(--accent)); }
.orb.speaking { background:linear-gradient(135deg,var(--green),#00b894); box-shadow:0 0 30px rgba(0,212,170,.4); }
@keyframes orb-pulse{0%,100%{box-shadow:0 0 20px rgba(255,71,87,.3)}50%{box-shadow:0 0 40px rgba(255,71,87,.6)}}
.orb svg { width:20px; height:20px; fill:white; pointer-events:none; }

.hint { font-size:9px; color:var(--muted); letter-spacing:.15em; text-transform:uppercase; }

/* Input row */
.input-row { display:flex; gap:8px; width:100%; align-items:flex-end; }
textarea {
  flex:1; background:var(--bg); border:1px solid var(--border); border-radius:12px;
  padding:10px 14px; color:var(--text); font-family:'JetBrains Mono',monospace;
  font-size:12px; resize:none; outline:none; max-height:80px; min-height:40px;
  line-height:1.5; transition:border-color .2s;
}
textarea::placeholder { color:var(--muted); }
textarea:focus { border-color:var(--accent); }
.send {
  width:40px; height:40px; border-radius:10px; flex-shrink:0;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  border:none; cursor:pointer; display:flex; align-items:center; justify-content:center;
  transition:transform .15s;
}
.send:active { transform:scale(.88); }
.send svg { width:16px; height:16px; fill:white; }

.err { font-size:10px; color:var(--red); text-align:center; min-height:14px; letter-spacing:.05em; }

/* ---- ТАБЫ НАВИГАЦИИ ---- */
.tabs {
  display:flex; background:var(--surface);
  border-bottom:1px solid var(--border);
  position:relative; z-index:10; flex-shrink:0;
}
.tab {
  flex:1; padding:10px 4px; text-align:center;
  font-family:'Unbounded',sans-serif; font-size:9px;
  letter-spacing:.05em; color:var(--muted);
  cursor:pointer; border:none; background:none;
  transition:all .2s; border-bottom:2px solid transparent;
}
.tab.active { color:var(--accent); border-bottom-color:var(--accent); }
.page { display:none; flex:1; overflow:hidden; flex-direction:column; }
.page.active { display:flex; }

/* ---- ДАШБОРД ---- */
.dash {
  flex:1; overflow-y:auto; padding:14px;
  display:flex; flex-direction:column; gap:12px;
}
.dash-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.dash-card {
  background:var(--card); border:1px solid var(--border);
  border-radius:14px; padding:14px;
}
.dash-card.full { grid-column:1/-1; }
.dash-label {
  font-size:9px; letter-spacing:.1em; color:var(--muted);
  font-family:'Unbounded',sans-serif; margin-bottom:6px;
}
.dash-val {
  font-size:22px; font-weight:600; color:var(--text);
  font-family:'Unbounded',sans-serif;
}
.dash-sub { font-size:10px; color:var(--muted); margin-top:2px; }
.progress-bar {
  height:6px; background:var(--border); border-radius:3px;
  overflow:hidden; margin-top:8px;
}
.progress-fill {
  height:100%; border-radius:3px;
  background:linear-gradient(90deg,var(--accent),var(--accent2));
  transition:width .5s ease;
}
.habit-row {
  display:flex; align-items:center; gap:8px;
  padding:8px 0; border-bottom:1px solid var(--border);
}
.habit-row:last-child { border:none; }
.habit-dots { display:flex; gap:3px; flex:1; }
.habit-dot {
  width:10px; height:10px; border-radius:50%;
  background:var(--border);
}
.habit-dot.done { background:var(--green); }
.habit-name { font-size:10px; color:var(--text); min-width:80px; }
.streak { font-size:10px; color:#fdcb6e; }

/* ---- КАРТЫ ---- */
.map-page { flex:1; display:flex; flex-direction:column; overflow:hidden; }
.map-search {
  padding:12px; background:var(--surface);
  border-bottom:1px solid var(--border); display:flex; gap:8px;
}
.map-search input {
  flex:1; background:var(--card); border:1px solid var(--border);
  border-radius:10px; padding:8px 12px; color:var(--text); font-size:12px;
}
.map-search button {
  padding:8px 16px; background:linear-gradient(135deg,var(--accent),var(--accent2));
  border:none; border-radius:10px; color:white; font-size:11px; cursor:pointer;
}
#map-frame {
  flex:1; border:none; background:var(--bg);
}
.map-results {
  max-height:200px; overflow-y:auto; background:var(--surface);
  border-top:1px solid var(--border);
}
.map-result-item {
  padding:10px 14px; border-bottom:1px solid var(--border);
  cursor:pointer; font-size:11px;
}
.map-result-item:hover { background:var(--card); }
.map-result-name { color:var(--text); font-weight:500; }
.map-result-addr { color:var(--muted); font-size:10px; margin-top:2px; }
</style>
</head>
<body>

<script>
// ============================================================
// ИНИЦИАЛИЗАЦИЯ TELEGRAM
// ============================================================
const tg = window.Telegram?.WebApp;
if (tg) {
  tg.ready();
  tg.expand();
  try { tg.setBackgroundColor('#080810'); } catch(e){}
  try { tg.setHeaderColor('#0f0f1a'); } catch(e){}
}

// ============================================================
// GROQ КЛЮЧ — зашит напрямую
// ============================================================
const GROQ_KEY = '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';

// Универсальная функция для запросов к Groq
async function groqChat(messages, systemPrompt) {
  try {
    const r = await fetch('https://api.groq.com/openai/v1/chat/completions', {
      method: 'POST',
      headers: {
        'Authorization': 'Bearer ' + GROQ_KEY,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        model: 'llama-3.3-70b-versatile',
        messages: [
          { role: 'system', content: systemPrompt || 'Ты AI-агент. Отвечай на русском.' },
          ...messages
        ],
        max_tokens: 500,
        temperature: 0.3
      })
    });
    if (r.ok) {
      const d = await r.json();
      return d?.choices?.[0]?.message?.content?.trim() || null;
    }
    return null;
  } catch(e) {
    console.error('groqChat error:', e);
    return null;
  }
}
const XI_KEY = 'sk_4f36ded5d3261c33de95f257934a1246f2e956d699767a13';
// ElevenLabs голос — мужской, интеллигентный, уверенный (Antoni)
const XI_VOICE = 'ErXwobaYiN019PkySvjV'; // Antoni — мужской, уверенный

// Обновляем badge
document.getElementById('badge').textContent = XI_KEY ? 'XI ✓' : (GROQ_KEY ? 'GROQ ✓' : 'NO KEY');
if (!GROQ_KEY) {
  document.getElementById('badge').style.borderColor = '#ff4757';
  document.getElementById('badge').style.color = '#ff4757';
}

// ============================================================
// СОСТОЯНИЕ
// ============================================================
let isRecording = false;
let isProcessing = false;
let mediaRecorder = null;
let audioChunks = [];
let ttsOn = true;
let curAudio = null;
let history = [];

// ============================================================
// TTS TOGGLE
// ============================================================
function toggleTTS() {
  ttsOn = !ttsOn;
  const sw = document.getElementById('sw');
  sw.className = 'sw' + (ttsOn ? '' : ' off');
  if (!ttsOn) {
    try { if (curAudio) { curAudio.pause(); curAudio = null; } } catch(e){}
    try { speechSynthesis?.cancel(); } catch(e){}
  }
}

// ============================================================
// ORB УПРАВЛЕНИЕ
// ============================================================
function handleOrb() {
  if (isProcessing) return;
  isRecording ? stopRec() : startRec();
}

async function startRec() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    const opts = MediaRecorder.isTypeSupported('audio/webm;codecs=opus')
      ? { mimeType: 'audio/webm;codecs=opus' }
      : {};
    mediaRecorder = new MediaRecorder(stream, opts);
    audioChunks = [];
    mediaRecorder.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data); };
    mediaRecorder.onstop = async () => {
      stream.getTracks().forEach(t => t.stop());
      const blob = new Blob(audioChunks, { type: mediaRecorder.mimeType || 'audio/webm' });
      await processVoice(blob);
    };
    mediaRecorder.start(100);
    isRecording = true;
    setOrb('recording');
    setHint('говори... нажми чтобы остановить');
    document.getElementById('wave').classList.add('show');
  } catch(e) {
    showErr('нет доступа к микрофону');
  }
}

function stopRec() {
  if (mediaRecorder && isRecording) {
    mediaRecorder.stop();
    isRecording = false;
    isProcessing = true;
    setOrb('processing');
    setHint('распознаю...');
    document.getElementById('wave').classList.remove('show');
  }
}

async function processVoice(blob) {
  const text = await stt(blob);
  if (!text) {
    showErr('не распознал речь, попробуй ещё раз');
    resetOrb();
    return;
  }
  addMsg('user', '🎤 ' + text);
  await aiReply(text);
}

// ============================================================
// STT (Speech-to-Text через Groq Whisper)
// ============================================================
async function stt(blob) {
  if (!GROQ_KEY) return null;
  try {
    const fd = new FormData();
    fd.append('file', blob, 'audio.webm');
    fd.append('model', 'whisper-large-v3');
    fd.append('language', 'ru');
    fd.append('response_format', 'json');
    const r = await fetch('https://api.groq.com/openai/v1/audio/transcriptions', {
      method: 'POST',
      headers: { 'Authorization': 'Bearer ' + GROQ_KEY },
      body: fd
    });
    if (!r.ok) return null;
    const d = await r.json();
    return d.text?.trim() || null;
  } catch(e) {
    console.error('STT error:', e);
    return null;
  }
}

// ============================================================
// AI ОТВЕТ
// ============================================================
async function aiReply(text) {
  setOrb('processing');
  setHint('думаю...');
  showTyping();

  history.push({ role: 'user', content: text, time: Date.now() });
  if (history.length > 20) history = history.slice(-20);

  let reply = null;
  try {
    const r = await fetch('https://api.groq.com/openai/v1/chat/completions', {
      method: 'POST',
      headers: {
        'Authorization': 'Bearer ' + GROQ_KEY,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        model: 'llama-3.3-70b-versatile',
        messages: [
          {
            role: 'system',
            content: 'Ты персональный AI-агент. Обращайся к пользователю: господин. Отвечай кратко и по делу — 2-3 предложения, так как ответ озвучивается голосом. Говори на русском языке.'
          },
          ...history.slice(-12)
        ],
        max_tokens: 300,
        temperature: 0.7
      })
    });
    if (r.ok) {
      const d = await r.json();
      reply = d?.choices?.[0]?.message?.content?.trim() || null;
    } else {
      const err = await r.text();
      console.error('AI error:', err);
    }
  } catch(e) {
    console.error('AI fetch error:', e);
    reply = 'Ошибка соединения. Попробуй ещё раз, господин.';
  }

  hideTyping();

  if (reply) {
    history.push({ role: 'assistant', content: reply });
    const el = addMsg('bot', reply);
    if (ttsOn) {
      try { await speak(reply, el); } catch(e) { console.error('speak error:', e); }
    }
  }

  resetOrb();
}

// ============================================================
// TTS (Text-to-Speech)
// ============================================================
async function speak(text, el) {
  // Останавливаем всё предыдущее
  try { if (curAudio) { curAudio.pause(); curAudio.src = ''; curAudio = null; } } catch(e){}
  try { speechSynthesis?.cancel(); } catch(e){}

  setOrb('speaking');
  setHint('говорю...');
  if (el) el.classList.add('speaking');
  const done = () => { if (el) el.classList.remove('speaking'); };
  const dbg = (msg) => {
    console.log('[TTS]', msg);
    setHint(msg.slice(0, 40));
  };

  // ---- Способ 1: ElevenLabs TTS (русский язык, высокое качество) ----
  dbg('XI_KEY=' + !!XI_KEY + ' XI_VOICE=' + XI_VOICE);
  if (XI_KEY) {
    try {
      dbg('запрос к ElevenLabs...');
      const r = await fetch('https://api.elevenlabs.io/v1/text-to-speech/' + XI_VOICE, {
        method: 'POST',
        headers: {
          'xi-api-key': XI_KEY,
          'Content-Type': 'application/json',
          'Accept': 'audio/mpeg'
        },
        body: JSON.stringify({
          text: text.slice(0, 500),
          model_id: 'eleven_multilingual_v2',
          voice_settings: {
            stability: 0.5,
            similarity_boost: 0.75,
            style: 0.3,
            use_speaker_boost: true
          }
        })
      });
      if (r.ok) {
        const blob = await r.blob();
        dbg('EL ok size=' + blob.size);
        if (blob.size > 500) {
          const url = URL.createObjectURL(blob);
          curAudio = new Audio(url);
          curAudio.volume = 1.0;
          await new Promise((resolve) => {
            curAudio.onended = resolve;
            curAudio.onerror = resolve;
            const p = curAudio.play();
            if (p && p.catch) p.catch(resolve);
            setTimeout(resolve, 60000);
          });
          URL.revokeObjectURL(url);
          done(); return;
        }
      } else {
        const err = await r.text();
        dbg('EL error ' + r.status + ' ' + err.slice(0,30));
      }
    } catch(e) {
      dbg('EL exception: ' + e.message.slice(0,30));
    }
  }

  // ---- Способ 2:  // ---- Способ 2: Браузерный TTS (fallback) ----
  if (window.speechSynthesis) {
    try {
      await new Promise((resolve) => {
        speechSynthesis.cancel();
        const u = new SpeechSynthesisUtterance(text.slice(0, 500));
        u.lang = 'ru-RU';
        u.rate = 0.9;
        u.pitch = 1.0;
        u.volume = 1.0;

        const doSpeak = () => {
          const voices = speechSynthesis.getVoices();
          const ru = voices.find(v => v.lang === 'ru-RU')
                  || voices.find(v => v.lang.startsWith('ru'))
                  || voices[0];
          if (ru) u.voice = ru;
          u.onend = resolve;
          u.onerror = resolve;
          speechSynthesis.speak(u);
        };

        const voices = speechSynthesis.getVoices();
        if (voices.length > 0) {
          doSpeak();
        } else {
          speechSynthesis.onvoiceschanged = doSpeak;
          setTimeout(resolve, 12000);
        }
      });
    } catch(e) {
      console.warn('Browser TTS error:', e);
    }
  }

  done();
}

function esc(t) {
  return t
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/\n/g,'<br>');
}

function switchTab(name) {
  // Убираем active у всех табов
  document.querySelectorAll('.tab').forEach((t, i) => {
    const names = ['agent', 'dash', 'map'];
    t.classList.toggle('active', names[i] === name);
  });
  // Скрываем все страницы
  document.querySelectorAll('.page').forEach(p => {
    p.classList.remove('active');
    p.style.display = 'none';
  });
  // Показываем нужную
  const page = document.getElementById('page-' + name);
  if (page) {
    page.classList.add('active');
    page.style.display = 'flex';
  }
  if (name === 'dash') loadDashboard();
  if (name === 'map') initMap();
}

// ДАШБОРД — загрузка данных из бота через Telegram
// ============================================================
async function loadDashboard() {
  // Показываем загрузку
  document.getElementById('d-msgs').textContent = '...';
  document.getElementById('d-tasks').textContent = '...';
  document.getElementById('d-goals').textContent = '...';
  document.getElementById('d-topics').textContent = '...';

  // Запрашиваем статистику у бота через Groq
  try {
    const resp = await groqChat([{
      role: 'user',
      content: 'Напиши JSON объект с моей статистикой. Используй только данные из нашего разговора. Формат: {"messages":число,"topics":число,"tasks_active":число,"tasks_done":число,"goals":число,"peak_hour":"HH:00"}. Только JSON без пояснений.'
    }], 'Ты статистический агент. Отвечай только JSON.');

    // Пробуем распарсить
    try {
      const clean = (resp||'').replace(/```json|```/g,'').trim();
      const d = JSON.parse(clean);
      document.getElementById('d-msgs').textContent = d.messages || history.length || '—';
      document.getElementById('d-tasks').textContent = (d.tasks_active||0) + ' / ' + (d.tasks_done||0);
      document.getElementById('d-goals').textContent = d.goals || '—';
      document.getElementById('d-topics').textContent = d.topics || '—';
      if (d.peak_hour) document.getElementById('d-peak').textContent = d.peak_hour;
    } catch(e) {}
  } catch(e) {}

  // Статистика из истории разговора (реальные данные)
  if (history.length > 0) {
    document.getElementById('d-msgs').textContent = history.filter(m=>m.role==='user').length;
  }

  // График по часам из истории
  const hourly = {};
  history.forEach(m => {
    if (m.role === 'user' && m.time) {
      const h = new Date(m.time).getHours();
      hourly[h] = (hourly[h]||0) + 1;
    }
  });

  // Демо данные если история пуста
  const now = new Date().getHours();
  if (!Object.keys(hourly).length) {
    hourly[now] = 3; hourly[(now-1+24)%24] = 1; hourly[(now-2+24)%24] = 2;
  }

  const maxH = Math.max(...Object.values(hourly), 1);
  const hourlyEl = document.getElementById('d-hourly');
  hourlyEl.innerHTML = Array.from({length:24}, (_,h) => {
    const val = hourly[h] || 0;
    const pct = Math.round(val / maxH * 100);
    const color = h === now ? 'var(--green)' : pct > 50 ? 'var(--accent)' : pct > 20 ? 'var(--accent2)' : 'var(--border)';
    return `<div title="${h}:00" style="flex:1;background:${color};border-radius:3px 3px 0 0;height:${Math.max(pct,4)}%;transition:height .4s;"></div>`;
  }).join('');

  if (Object.keys(hourly).length) {
    const peak = Object.entries(hourly).sort((a,b)=>b[1]-a[1])[0];
    document.getElementById('d-peak').textContent = peak[0] + ':00';
  }

  // Заполняем цели/привычки заглушкой если нет данных
  const goalsEl = document.getElementById('d-goals-list');
  if (goalsEl.innerHTML.includes('Нет')) {
    goalsEl.innerHTML = '<div class="dash-sub" style="color:var(--muted)">Добавь цели через /goals в боте</div>';
  }
  const habitsEl = document.getElementById('d-habits-list');
  if (habitsEl.innerHTML.includes('Нет')) {
    habitsEl.innerHTML = '<div class="dash-sub" style="color:var(--muted)">Добавь привычки через /habits в боте</div>';
  }
}

function calcStreak(checks) {
  let streak = 0;
  const now = new Date();
  for (let i = 0; i < 365; i++) {
    const d = new Date(now); d.setDate(d.getDate() - i);
    const key = d.toLocaleDateString('ru-RU',{day:'2-digit',month:'2-digit',year:'numeric'}).replace(/\//g,'.');
    if (checks[key]) streak++; else break;
  }
  return streak;
}

let userLat = null, userLon = null;
let mapInited = false;

function initMap() {
  if (mapInited) return;
  mapInited = true;

  // Грузим карту сразу с дефолтным видом
  const frame = document.getElementById('map-frame');
  frame.src = 'https://www.openstreetmap.org/export/embed.html?bbox=37.4,55.6,37.9,55.9&layer=mapnik';

  // Пробуем геолокацию в фоне
  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(pos => {
      userLat = pos.coords.latitude;
      userLon = pos.coords.longitude;
      const d = 0.025;
      frame.src = `https://www.openstreetmap.org/export/embed.html?bbox=${userLon-d},${userLat-d},${userLon+d},${userLat+d}&layer=mapnik&marker=${userLat},${userLon}`;
    }, () => {
      // Геолокация отклонена — карта уже загружена, всё ок
    }, {timeout: 5000});
  }
}

async function searchCat(amenity, label) {
  if (!userLat) {
    document.getElementById('map-results').innerHTML =
      '<div class="map-result-item" style="color:var(--red)">📍 Геолокация не определена. Разреши доступ.</div>';
    return;
  }
  const resultsEl = document.getElementById('map-results');
  resultsEl.innerHTML = `<div class="map-result-item" style="color:var(--muted)">🔍 Ищу ${label} рядом...</div>`;

  try {
    const radius = 1500;
    const query = `[out:json][timeout:10];node["amenity"~"${amenity}"](around:${radius},${userLat},${userLon});out body 10;`;
    const r = await fetch('https://overpass-api.de/api/interpreter', {
      method: 'POST', body: query
    });
    const data = await r.json();
    const elements = data.elements || [];

    if (!elements.length) {
      // fallback nominatim
      await searchMapWithCoords(label);
      return;
    }

    // Sort by distance
    function dist(e) {
      const dLat = (e.lat - userLat) * Math.PI/180;
      const dLon = (e.lon - userLon) * Math.PI/180;
      const a = Math.sin(dLat/2)**2 + Math.cos(userLat*Math.PI/180)*Math.cos(e.lat*Math.PI/180)*Math.sin(dLon/2)**2;
      return 6371000 * 2 * Math.asin(Math.sqrt(a));
    }
    elements.sort((a,b) => dist(a)-dist(b));

    resultsEl.innerHTML = elements.slice(0,8).map(e => {
      const name = e.tags?.name || e.tags?.['name:ru'] || e.tags?.brand || 'Без названия';
      const d = Math.round(dist(e));
      const dStr = d < 1000 ? d+'м' : (d/1000).toFixed(1)+'км';
      const routeUrl = `https://www.openstreetmap.org/directions?from=${userLat},${userLon}&to=${e.lat},${e.lon}`;
      const oh = e.tags?.opening_hours || '';
      return `<div class="map-result-item" onclick="showOnMap(${e.lat},${e.lon},'${name.replace(/'/g,'`')}')">
        <div class="map-result-name">📍 ${name} — ${dStr}</div>
        ${oh ? `<div class="map-result-addr">⏰ ${oh.slice(0,40)}</div>` : ''}
        <div class="map-result-addr" style="margin-top:3px;">
          <a href="${routeUrl}" target="_blank" style="color:var(--accent);">🗺 Маршрут →</a>
        </div>
      </div>`;
    }).join('');

    // Show first result on map
    if (elements[0]) showOnMap(elements[0].lat, elements[0].lon, '');
  } catch(e) {
    resultsEl.innerHTML = `<div class="map-result-item" style="color:var(--red)">Ошибка: ${e.message}</div>`;
  }
}

    const dLon = (p2.lon-p1.lon)*Math.PI/180;
    const a = Math.sin(dLat/2)**2 + Math.cos(p1.lat*Math.PI/180)*Math.cos(p2.lat*Math.PI/180)*Math.sin(dLon/2)**2;
    const dist = R * 2 * Math.asin(Math.sqrt(a));

    const carMin = Math.round(dist/0.5);
    const walkMin = Math.round(dist/0.083);
    const transitMin = Math.round(dist/0.4);

    // Показываем оба маркера на карте
    const minLat = Math.min(p1.lat,p2.lat)-0.01, maxLat = Math.max(p1.lat,p2.lat)+0.01;
    const minLon = Math.min(p1.lon,p2.lon)-0.01, maxLon = Math.max(p1.lon,p2.lon)+0.01;
    document.getElementById('map-frame').src =
      `https://www.openstreetmap.org/export/embed.html?bbox=${minLon},${minLat},${maxLon},${maxLat}&layer=mapnik`;

    const routeUrl = `https://www.openstreetmap.org/directions?from=${p1.lat},${p1.lon}&to=${p2.lat},${p2.lon}`;
    resultsEl.innerHTML = `
      <div class="map-result-item">
        <div class="map-result-name">📏 Расстояние: ${dist.toFixed(1)} км</div>
        <div class="map-result-addr">🚗 Авто ~${carMin} мин • 🚌 Транспорт ~${transitMin} мин • 🚶 Пешком ~${walkMin} мин</div>
      </div>
      <div class="map-result-item" onclick="window.open('${routeUrl}','_blank')" style="color:var(--accent);cursor:pointer;">
        🔗 Открыть маршрут на OpenStreetMap →
      </div>
    `;
  } catch(e) {
    resultsEl.innerHTML = `<div class="map-result-item" style="color:var(--red)">Ошибка: ${e.message}</div>`;
  }
}


  const d = 0.008;
  const frame = document.getElementById('map-frame');
  frame.src = `https://www.openstreetmap.org/export/embed.html?bbox=${lon-d},${lat-d},${lon+d},${lat+d}&layer=mapnik&marker=${lat},${lon}`;
}

// ============================================================
// НЕПРЕРЫВНЫЙ ДИАЛОГ
// ============================================================
let continuousMode = false;

function toggleContinuous() {
  continuousMode = !continuousMode;
  const btn = document.getElementById('cont-btn');
  if (continuousMode) {
    btn.textContent = '🔴 Стоп режим';
    btn.style.background = 'linear-gradient(135deg,#ff4757,#ff6b81)';
    btn.style.opacity = '1';
    setHint('непрерывный режим — говори...');
    if (!isRecording && !isProcessing) startRec();
  } else {
    btn.textContent = '🔄 Непрерывный';
    btn.style.background = 'linear-gradient(135deg,var(--accent),var(--accent2))';
    btn.style.opacity = '.85';
    setHint('нажми чтобы говорить');
  }
}

// Патчим aiReply для автоперезапуска после ответа
const _origSpeak = speak;
const _origResetOrb = resetOrb;
resetOrb = function() {
  _origResetOrb();
  if (continuousMode && !isRecording && !isProcessing) {
    setTimeout(() => {
      if (continuousMode) {
        setHint('слушаю...');
        startRec();
      }
    }, 1200);
  }
};

// ============================================================
// ИНИЦИАЛИЗАЦИЯ ГОЛОСОВ
// ============================================================
if (window.speechSynthesis) {
  speechSynthesis.getVoices();
  speechSynthesis.onvoiceschanged = () => speechSynthesis.getVoices();
}

// ============================================================
// ПРИВЕТСТВИЕ
// ============================================================
setTimeout(async () => {
  const msg = 'Господин, я готов. Нажмите орб чтобы говорить, или напишите текстом.';
  const el = addMsg('bot', msg);
  if (ttsOn) {
    try { await speak(msg, el); } catch(e) {}
  }
}, 800);
</script>
