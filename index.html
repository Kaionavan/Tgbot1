<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>AI Агент</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0a0f;--s1:#111118;--s2:#18181f;--s3:#22222c;
  --b1:#2a2a38;--b2:#3a3a4a;
  --p:#7c6ee0;--p2:#9f7aea;--pg:linear-gradient(135deg,#7c6ee0,#9f7aea);
  --green:#10b981;--red:#ef4444;--amber:#f59e0b;--blue:#3b82f6;
  --t1:#f0f0f8;--t2:#a0a0b8;--t3:#50506a;
  --r:14px;--r2:10px;--r3:20px;
  --shadow:0 4px 24px rgba(0,0,0,.4);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-font-smoothing:antialiased}
html,body{height:100%;overflow:hidden;font-family:'Inter',sans-serif;background:var(--bg);color:var(--t1)}

/* ─── LAYOUT ─── */
#app{display:flex;flex-direction:column;height:100vh;position:relative}

/* ─── HEADER ─── */
#hdr{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 16px;background:var(--s1);
  border-bottom:1px solid var(--b1);flex-shrink:0;
  backdrop-filter:blur(20px);
}
.hdr-brand{display:flex;align-items:center;gap:10px}
.logo{
  width:36px;height:36px;border-radius:10px;
  background:var(--pg);display:flex;align-items:center;justify-content:center;
  font-size:16px;font-weight:700;color:white;flex-shrink:0;
  box-shadow:0 2px 12px rgba(124,110,224,.4);
}
.brand-text h1{font-size:14px;font-weight:600;letter-spacing:.01em}
.brand-text p{font-size:10px;color:var(--t3);margin-top:1px}
.status-dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 2s infinite;margin-left:2px}
@keyframes pulse{0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(16,185,129,.4)}50%{opacity:.8;box-shadow:0 0 0 4px rgba(16,185,129,0)}}
.hdr-right{display:flex;align-items:center;gap:10px}
.badge{
  padding:4px 10px;border-radius:20px;font-size:10px;font-weight:500;
  background:rgba(124,110,224,.15);border:1px solid rgba(124,110,224,.3);
  color:var(--p2);letter-spacing:.03em;
}
.tts-toggle{display:flex;align-items:center;gap:6px;cursor:pointer;padding:4px}
.tts-label{font-size:10px;color:var(--t3);font-weight:500}
.toggle{
  width:34px;height:20px;border-radius:10px;background:var(--p);
  position:relative;transition:background .25s;cursor:pointer;flex-shrink:0;
}
.toggle::after{
  content:'';position:absolute;top:2px;right:2px;
  width:16px;height:16px;border-radius:50%;background:white;
  transition:right .25s;box-shadow:0 1px 3px rgba(0,0,0,.3);
}
.toggle.off{background:var(--b2)}.toggle.off::after{right:16px}

/* ─── TABS ─── */
#tabs{
  display:flex;background:var(--s1);border-bottom:1px solid var(--b1);flex-shrink:0;
}
.tab{
  flex:1;padding:11px;text-align:center;font-size:11px;font-weight:500;
  color:var(--t3);cursor:pointer;border:none;background:none;
  border-bottom:2px solid transparent;transition:all .2s;letter-spacing:.02em;
}
.tab.on{color:var(--p2);border-bottom-color:var(--p)}

/* ─── PAGES ─── */
.pg{display:none;flex:1;flex-direction:column;min-height:0;overflow:hidden}
.pg.on{display:flex}

/* ═══════════════════════════════
   АГЕНТ
═══════════════════════════════ */
#chat{
  flex:1;overflow-y:auto;padding:16px 14px 10px;
  display:flex;flex-direction:column;gap:12px;
  scroll-behavior:smooth;
}
#chat::-webkit-scrollbar{width:3px}
#chat::-webkit-scrollbar-track{background:transparent}
#chat::-webkit-scrollbar-thumb{background:var(--b2);border-radius:2px}

.msg{max-width:86%;animation:msgIn .2s ease;word-break:break-word;line-height:1.5}
@keyframes msgIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.msg.me{align-self:flex-end}
.msg.me .bubble{
  background:var(--pg);color:white;
  border-radius:var(--r) var(--r) 4px var(--r);
  padding:10px 14px;font-size:14px;
  box-shadow:0 2px 12px rgba(124,110,224,.3);
}
.msg.ai{align-self:flex-start}
.msg.ai .lbl{font-size:9px;color:var(--t3);font-weight:600;letter-spacing:.08em;margin-bottom:4px;padding-left:2px}
.msg.ai .bubble{
  background:var(--s2);border:1px solid var(--b1);
  border-radius:4px var(--r) var(--r) var(--r);
  padding:10px 14px;font-size:14px;color:var(--t1);
}
.msg.ai.speaking .bubble{border-color:var(--green);box-shadow:0 0 0 1px rgba(16,185,129,.3),0 4px 16px rgba(16,185,129,.15)}

/* Typing */
.typing-bubble{
  align-self:flex-start;background:var(--s2);border:1px solid var(--b1);
  border-radius:4px var(--r) var(--r) var(--r);
  padding:12px 16px;display:flex;gap:5px;align-items:center;
}
.dot{width:7px;height:7px;border-radius:50%;background:var(--t3);animation:dotBlink 1.4s infinite}
.dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}
@keyframes dotBlink{0%,100%{opacity:.3;transform:scale(.8)}50%{opacity:1;transform:scale(1)}}

/* ─── CONTROLS ─── */
#ctrl{
  flex-shrink:0;background:var(--s1);border-top:1px solid var(--b1);
  padding:12px 16px 16px;display:flex;flex-direction:column;align-items:center;gap:10px;
}

/* Wave */
#wave{display:none;gap:3px;align-items:flex-end;height:24px}
#wave.show{display:flex}
.wb{
  width:3px;border-radius:2px;background:var(--red);
  animation:wv .7s ease-in-out infinite;
}
.wb:nth-child(1){height:6px;animation-delay:0s}
.wb:nth-child(2){height:14px;animation-delay:.08s}
.wb:nth-child(3){height:20px;animation-delay:.16s}
.wb:nth-child(4){height:14px;animation-delay:.24s}
.wb:nth-child(5){height:20px;animation-delay:.32s}
.wb:nth-child(6){height:14px;animation-delay:.40s}
.wb:nth-child(7){height:6px;animation-delay:.48s}
.wb:nth-child(8){height:10px;animation-delay:.56s}
@keyframes wv{0%,100%{transform:scaleY(.6)}50%{transform:scaleY(1)}}

/* Orb */
.orb-area{position:relative;width:84px;height:84px;display:flex;align-items:center;justify-content:center}
.ring{
  position:absolute;inset:-6px;border-radius:50%;
  border:1px solid transparent;
  border-top-color:var(--p);border-right-color:var(--p2);
  animation:spin 3s linear infinite;
}
.ring:nth-child(2){inset:-12px;animation-duration:5s;animation-direction:reverse;opacity:.4;border-top-color:var(--p2);border-right-color:var(--p)}
@keyframes spin{to{transform:rotate(360deg)}}
#orb{
  width:72px;height:72px;border-radius:50%;
  background:var(--pg);border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 0 24px rgba(124,110,224,.45),var(--shadow);
  transition:transform .15s,box-shadow .15s;position:relative;z-index:1;
}
#orb:active{transform:scale(.9)}
#orb svg{width:28px;height:28px;fill:white}
#orb.rec{background:linear-gradient(135deg,#ef4444,#f97316);box-shadow:0 0 28px rgba(239,68,68,.5)}
#orb.proc{animation:orbP 1s ease-in-out infinite}
#orb.spk{background:linear-gradient(135deg,var(--green),#059669);box-shadow:0 0 28px rgba(16,185,129,.5)}
@keyframes orbP{0%,100%{transform:scale(1);box-shadow:0 0 24px rgba(124,110,224,.45)}50%{transform:scale(1.07);box-shadow:0 0 36px rgba(124,110,224,.7)}}

#hint{font-size:11px;color:var(--t3);font-weight:500;letter-spacing:.02em}

/* Cont button */
#cbtn{
  padding:7px 20px;border-radius:var(--r3);font-size:11px;font-weight:600;
  background:var(--s3);border:1px solid var(--b1);
  color:var(--t2);cursor:pointer;transition:all .2s;letter-spacing:.02em;
}
#cbtn.on{background:rgba(239,68,68,.15);border-color:rgba(239,68,68,.4);color:#f97316}

/* Input row */
.inp-row{display:flex;gap:8px;width:100%;align-items:flex-end}
#txt{
  flex:1;background:var(--s2);border:1px solid var(--b1);
  border-radius:var(--r);padding:10px 14px;
  color:var(--t1);font-family:'Inter',sans-serif;font-size:14px;
  resize:none;min-height:42px;max-height:90px;outline:none;
  transition:border-color .2s;line-height:1.45;
}
#txt::placeholder{color:var(--t3)}
#txt:focus{border-color:var(--p)}
#sbtn{
  width:42px;height:42px;border-radius:var(--r2);flex-shrink:0;
  background:var(--pg);border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 2px 10px rgba(124,110,224,.35);transition:transform .15s;
}
#sbtn:active{transform:scale(.88)}
#sbtn svg{width:17px;height:17px;fill:white}
#err{font-size:11px;color:var(--red);text-align:center;min-height:14px;font-weight:500}

/* ═══════════════════════════════
   КАРТЫ
═══════════════════════════════ */
.map-wrap{flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0}

.map-top{flex-shrink:0;background:var(--s1);border-bottom:1px solid var(--b1)}

.map-srch{display:flex;gap:8px;padding:10px 12px}
.map-srch input{
  flex:1;background:var(--s2);border:1px solid var(--b1);
  border-radius:var(--r);padding:9px 14px;
  color:var(--t1);font-size:14px;font-family:'Inter',sans-serif;outline:none;
  transition:border-color .2s;
}
.map-srch input::placeholder{color:var(--t3)}
.map-srch input:focus{border-color:var(--p)}
.map-srch button{
  width:42px;height:42px;border-radius:var(--r);flex-shrink:0;
  background:var(--pg);border:none;cursor:pointer;font-size:16px;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 2px 10px rgba(124,110,224,.3);
}

.cats{display:flex;gap:6px;padding:0 12px 10px;overflow-x:auto}
.cats::-webkit-scrollbar{display:none}
.cat{
  white-space:nowrap;padding:6px 14px;
  background:var(--s2);border:1px solid var(--b1);
  border-radius:var(--r3);color:var(--t2);font-size:12px;font-weight:500;
  cursor:pointer;transition:all .15s;flex-shrink:0;
}
.cat:active,.cat.active{background:rgba(124,110,224,.2);border-color:var(--p);color:var(--p2)}

#mframe{flex:1;border:none;min-height:0;display:block}

#mres{
  max-height:240px;overflow-y:auto;
  background:var(--bg);border-top:1px solid var(--b1);flex-shrink:0;
}
#mres::-webkit-scrollbar{width:3px}
#mres::-webkit-scrollbar-thumb{background:var(--b2);border-radius:2px}

/* Карточки мест — стиль Яндекс */
.place-card{
  display:flex;gap:12px;padding:12px 14px;
  border-bottom:1px solid var(--b1);cursor:pointer;
  transition:background .15s;
}
.place-card:last-child{border:none}
.place-card:active{background:var(--s1)}
.pc-icon{
  width:44px;height:44px;border-radius:12px;
  background:var(--s2);border:1px solid var(--b1);
  display:flex;align-items:center;justify-content:center;
  font-size:22px;flex-shrink:0;
}
.pc-body{flex:1;min-width:0}
.pc-name{
  font-size:13px;font-weight:500;color:var(--t1);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.pc-addr{
  font-size:11px;color:var(--t3);margin-top:2px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.pc-meta{display:flex;gap:6px;margin-top:7px;flex-wrap:wrap;align-items:center}
.chip{
  padding:3px 9px;border-radius:8px;font-size:10px;font-weight:500;
  background:var(--s2);border:1px solid var(--b1);color:var(--t2);
  white-space:nowrap;
}
.chip.dist{background:rgba(16,185,129,.1);border-color:rgba(16,185,129,.3);color:var(--green)}
.chip.car{background:rgba(59,130,246,.1);border-color:rgba(59,130,246,.3);color:var(--blue)}
.chip.walk{color:var(--t3)}
.pc-btns{display:flex;gap:6px;margin-top:8px}
.pc-btn{
  padding:6px 14px;border-radius:var(--r3);font-size:11px;font-weight:600;
  text-decoration:none;cursor:pointer;transition:all .15s;display:inline-block;
  letter-spacing:.02em;
}
.pc-btn.main{background:var(--pg);color:white;box-shadow:0 2px 8px rgba(124,110,224,.3)}
.pc-btn.sec{background:var(--s2);border:1px solid var(--b1);color:var(--t2)}

/* Спиннер загрузки */
.loader{
  padding:24px;text-align:center;
}
.spinner{
  width:28px;height:28px;border:2.5px solid var(--b2);
  border-top-color:var(--p);border-radius:50%;
  animation:spin 1s linear infinite;margin:0 auto 10px;
}
.loader p{font-size:12px;color:var(--t3);font-weight:500}

/* Empty state */
.empty{
  padding:28px;text-align:center;
}
.empty-icon{font-size:32px;margin-bottom:8px}
.empty p{font-size:13px;color:var(--t3)}
.empty small{font-size:11px;color:var(--t3);opacity:.6;margin-top:4px;display:block}
</style>
</head>
<body>
<div id="app">

<!-- HEADER -->
<div id="hdr">
  <div class="hdr-brand">
    <div class="logo">AI</div>
    <div class="brand-text">
      <h1>Агент <span class="status-dot" style="display:inline-block;vertical-align:middle"></span></h1>
      <p id="status-text">готов к работе</p>
    </div>
  </div>
  <div class="hdr-right">
    <div class="badge" id="badge">XI ✓</div>
    <div class="tts-toggle" onclick="toggleTTS()">
      <span class="tts-label">ГОЛОС</span>
      <div class="toggle" id="tgl"></div>
    </div>
  </div>
</div>

<!-- TABS -->
<div id="tabs">
  <button class="tab on" id="t-a" onclick="showTab('a')">🎙 АГЕНТ</button>
  <button class="tab"    id="t-m" onclick="showTab('m')">🗺 КАРТЫ</button>
</div>

<!-- PAGE: АГЕНТ -->
<div class="pg on" id="pg-a">
  <div id="chat"></div>
  <div id="ctrl">
    <div id="wave">
      <div class="wb"></div><div class="wb"></div><div class="wb"></div><div class="wb"></div>
      <div class="wb"></div><div class="wb"></div><div class="wb"></div><div class="wb"></div>
    </div>
    <div class="orb-area">
      <div class="ring"></div><div class="ring"></div>
      <button id="orb" onclick="handleOrb()">
        <svg viewBox="0 0 24 24"><path d="M12 1a4 4 0 0 1 4 4v6a4 4 0 0 1-8 0V5a4 4 0 0 1 4-4zm-2 4v6a2 2 0 1 0 4 0V5a2 2 0 1 0-4 0zm-3 6a5 5 0 0 0 10 0h2a7 7 0 0 1-6 6.92V20h3v2H8v-2h3v-2.08A7 7 0 0 1 5 11h2z"/></svg>
      </button>
    </div>
    <div id="hint">нажми чтобы говорить</div>
    <button id="cbtn" onclick="toggleCont()">🔄 Непрерывный режим</button>
    <div class="inp-row">
      <textarea id="txt" placeholder="или напиши сообщение..." rows="1"
        onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendTxt()}"
        oninput="this.style.height='auto';this.style.height=Math.min(this.scrollHeight,90)+'px'"></textarea>
      <button id="sbtn" onclick="sendTxt()">
        <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
      </button>
    </div>
    <div id="err"></div>
  </div>
</div>

<!-- PAGE: КАРТЫ -->
<div class="pg" id="pg-m">
  <div class="map-wrap">
    <div class="map-top">
      <div class="map-srch">
        <input id="mq" placeholder="Plov Centre, музей, аптека..." type="text"
          onkeydown="if(event.key==='Enter')doSearch()">
        <button onclick="doSearch()">🔍</button>
      </div>
      <div class="cats">
        <button class="cat" onclick="byCat('кафе ресторан','🍽 Еда','restaurant')">🍽 Еда</button>
        <button class="cat" onclick="byCat('кофейня coffee','☕ Кофе','cafe')">☕ Кофе</button>
        <button class="cat" onclick="byCat('музей museum','🏛 Музеи','museum')">🏛 Музеи</button>
        <button class="cat" onclick="byCat('аптека pharmacy','💊 Аптека','pharmacy')">💊 Аптека</button>
        <button class="cat" onclick="byCat('банк bank ATM','🏦 Банк','bank')">🏦 Банк</button>
        <button class="cat" onclick="byCat('супермаркет Korzinka Makro','🛒 Магазин','shop')">🛒 Магазин</button>
        <button class="cat" onclick="byCat('АЗС заправка petrol','⛽ АЗС','fuel')">⛽ АЗС</button>
        <button class="cat" onclick="byCat('отель гостиница hotel','🏨 Отель','hotel')">🏨 Отель</button>
      </div>
    </div>
    <iframe id="mframe" src="about:blank" allowfullscreen></iframe>
    <div id="mres"></div>
  </div>
</div>

</div><!-- /app -->

<script>
// ═══════════════════════════════
// КЛЮЧИ
// ═══════════════════════════════
const GROQ = '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';
const XI   = 'sk_4f36ded5d3261c33de95f257934a1246f2e956d699767a13';
const XIV  = 'ErXwobaYiN019PkySvjV'; // Antoni — глубокий мужской голос

// ═══════════════════════════════
// TELEGRAM
// ═══════════════════════════════
const tg = window.Telegram?.WebApp;
if (tg) {
  tg.ready(); tg.expand();
  try { tg.setBackgroundColor('#0a0a0f'); } catch(e) {}
  try { tg.setHeaderColor('#111118'); } catch(e) {}
}

// ═══════════════════════════════
// СОСТОЯНИЕ
// ═══════════════════════════════
let rec=false, proc=false, mr=null, chunks=[], ttsOn=true, audio=null, cont=false, hist=[];

// ═══════════════════════════════
// ТАБЫ
// ═══════════════════════════════
function showTab(t) {
  ['a','m'].forEach(n => {
    document.getElementById('t-'+n).classList.toggle('on', n===t);
    document.getElementById('pg-'+n).classList.toggle('on', n===t);
  });
  if (t === 'm') initMap();
}

// ═══════════════════════════════
// TTS ПЕРЕКЛЮЧЕНИЕ
// ═══════════════════════════════
function toggleTTS() {
  ttsOn = !ttsOn;
  document.getElementById('tgl').className = 'toggle' + (ttsOn ? '' : ' off');
  setStatus(ttsOn ? 'голос включён' : 'голос выключен');
  if (!ttsOn && audio) { try { audio.pause(); audio=null; } catch(e) {} }
}

// ═══════════════════════════════
// ORB
// ═══════════════════════════════
function handleOrb() { if (!proc) rec ? stopRec() : startRec(); }

function setOrb(s) { document.getElementById('orb').className = s || ''; }
function setHint(t) { document.getElementById('hint').textContent = t; }
function setStatus(t) { document.getElementById('status-text').textContent = t; }
function showWave(v) { document.getElementById('wave').classList.toggle('show', v); }

function resetOrb() {
  proc = false;
  setOrb(''); showWave(false);
  setHint(cont ? 'слушаю...' : 'нажми чтобы говорить');
  setStatus('готов к работе');
  if (cont && !rec && !proc) setTimeout(() => { if (cont && !rec && !proc) startRec(); }, 800);
}

// ═══════════════════════════════
// ЗАПИСЬ
// ═══════════════════════════════
async function startRec() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    const opts = MediaRecorder.isTypeSupported('audio/webm;codecs=opus')
      ? { mimeType: 'audio/webm;codecs=opus' } : {};
    mr = new MediaRecorder(stream, opts);
    chunks = [];
    mr.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };
    mr.onstop = async () => {
      stream.getTracks().forEach(t => t.stop());
      await processVoice(new Blob(chunks, { type: mr.mimeType || 'audio/webm' }));
    };
    mr.start(100);
    rec = true;
    setOrb('rec'); showWave(true);
    setHint('говори... нажми для остановки');
    setStatus('записываю...');
  } catch(e) {
    showErr('нет доступа к микрофону');
    resetOrb();
  }
}

function stopRec() {
  if (mr && rec) {
    rec = false; proc = true;
    mr.stop();
    setOrb('proc'); showWave(false);
    setHint('распознаю...'); setStatus('обрабатываю...');
  }
}

async function processVoice(blob) {
  const txt = await stt(blob);
  proc = false;
  if (!txt || txt.trim().length < 2) {
    showErr('не распознал — говори чётче');
    resetOrb(); return;
  }
  addMsg('me', '🎤 ' + txt);
  await aiReply(txt);
}

// ═══════════════════════════════
// STT — Groq Whisper
// ═══════════════════════════════
async function stt(blob) {
  try {
    const fd = new FormData();
    const fn = blob.type.includes('webm') ? 'a.webm' : blob.type.includes('mp4') ? 'a.mp4' : 'a.wav';
    fd.append('file', blob, fn);
    fd.append('model', 'whisper-large-v3');
    fd.append('language', 'ru');
    fd.append('response_format', 'json');
    const r = await fetch('https://api.groq.com/openai/v1/audio/transcriptions', {
      method: 'POST', headers: { 'Authorization': 'Bearer ' + GROQ }, body: fd
    });
    if (!r.ok) { showErr('STT ' + r.status); return null; }
    return (await r.json()).text?.trim() || null;
  } catch(e) { showErr('нет сети'); return null; }
}

// ═══════════════════════════════
// AI ОТВЕТ
// ═══════════════════════════════
async function aiReply(text) {
  setOrb('proc'); setHint('думаю...'); setStatus('генерирую ответ...');
  showTyping();
  hist.push({ role: 'user', content: text });
  if (hist.length > 24) hist = hist.slice(-24);

  const sys = 'Ты элитный персональный AI-агент. Обращайся: господин. Отвечай чётко — 2-3 предложения, ответ озвучивается голосом. Язык: русский. Будь конкретным и полезным.';
  let reply = null;

  for (const m of ['llama-3.3-70b-versatile', 'llama-3.1-8b-instant', 'gemma2-9b-it']) {
    try {
      const r = await fetch('https://api.groq.com/openai/v1/chat/completions', {
        method: 'POST',
        headers: { 'Authorization': 'Bearer ' + GROQ, 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: m,
          messages: [{ role: 'system', content: sys }, ...hist.slice(-14)],
          max_tokens: 400, temperature: 0.72
        })
      });
      if (r.ok) { reply = (await r.json())?.choices?.[0]?.message?.content?.trim() || null; if (reply) break; }
    } catch(e) {}
  }

  hideTyping();
  if (reply) {
    hist.push({ role: 'assistant', content: reply });
    const el = addMsg('ai', reply);
    if (ttsOn) { try { await speak(reply, el); } catch(e) {} }
    else resetOrb();
  } else {
    showErr('AI не ответил');
    resetOrb();
  }
}

// ═══════════════════════════════
// TTS — ElevenLabs + Web Speech
// ═══════════════════════════════
async function speak(text, el) {
  try { if (audio) { audio.pause(); audio = null; } } catch(e) {}
  try { speechSynthesis?.cancel(); } catch(e) {}
  setOrb('spk'); setHint('говорю...'); setStatus('озвучиваю...');
  if (el) el.classList.add('speaking');
  const done = () => { if (el) el.classList.remove('speaking'); };

  if (XI) {
    try {
      const r = await fetch('https://api.elevenlabs.io/v1/text-to-speech/' + XIV, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'xi-api-key': XI },
        body: JSON.stringify({
          text: text.slice(0, 500),
          model_id: 'eleven_multilingual_v2',
          voice_settings: { stability: 0.48, similarity_boost: 0.78, style: 0.12 }
        })
      });
      if (r.ok) {
        const url = URL.createObjectURL(await r.blob());
        audio = new Audio(url);
        await new Promise((res, rej) => { audio.onended = res; audio.onerror = rej; audio.play().catch(rej); });
        URL.revokeObjectURL(url);
        done(); resetOrb(); return;
      }
    } catch(e) { console.warn('XI:', e); }
  }

  // Web Speech fallback
  try {
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'ru-RU'; u.rate = 1.05;
    await new Promise(res => { u.onend = res; u.onerror = res; speechSynthesis.speak(u); });
  } catch(e) {}
  done(); resetOrb();
}

// ═══════════════════════════════
// ТЕКСТОВЫЙ ВВОД
// ═══════════════════════════════
async function sendTxt() {
  const ta = document.getElementById('txt');
  const t = ta.value.trim();
  if (!t || proc) return;
  ta.value = ''; ta.style.height = 'auto';
  addMsg('me', t);
  await aiReply(t);
}

// ═══════════════════════════════
// НЕПРЕРЫВНЫЙ РЕЖИМ
// ═══════════════════════════════
function toggleCont() {
  cont = !cont;
  const b = document.getElementById('cbtn');
  b.classList.toggle('on', cont);
  b.textContent = cont ? '🔴 Остановить' : '🔄 Непрерывный режим';
  if (cont) { setHint('слушаю...'); if (!rec && !proc) startRec(); }
  else { setHint('нажми чтобы говорить'); if (rec) stopRec(); }
}

// ═══════════════════════════════
// UI HELPERS
// ═══════════════════════════════
function addMsg(role, text) {
  const c = document.getElementById('chat');
  const d = document.createElement('div');
  d.className = 'msg ' + role;
  if (role === 'ai') {
    d.innerHTML = '<div class="lbl">▸ AI АГЕНТ</div><div class="bubble">' + esc(text) + '</div>';
  } else {
    d.innerHTML = '<div class="bubble">' + esc(text) + '</div>';
  }
  c.appendChild(d);
  c.scrollTop = c.scrollHeight;
  return d;
}

let te = null;
function showTyping() {
  hideTyping();
  const c = document.getElementById('chat');
  te = document.createElement('div');
  te.className = 'typing-bubble';
  te.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
  c.appendChild(te);
  c.scrollTop = c.scrollHeight;
}
function hideTyping() { if (te) { te.remove(); te = null; } }
function showErr(m) {
  const e = document.getElementById('err');
  e.textContent = '⚠ ' + m;
  setTimeout(() => e.textContent = '', 4000);
}
function esc(t) {
  return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}

// ═══════════════════════════════
// КАРТЫ
// ═══════════════════════════════
let ulat=null, ulon=null, minit=false;

const ICONS = {
  restaurant:'🍽',cafe:'☕',fast_food:'🍔',bar:'🍺',
  museum:'🏛',gallery:'🖼',theatre:'🎭',
  pharmacy:'💊',hospital:'🏥',
  bank:'🏦',atm:'💳',
  supermarket:'🛒',convenience:'🛍',mall:'🏬',
  fuel:'⛽',hotel:'🏨',hostel:'🛏',
  park:'🌳',default:'📍'
};

function distM(lat,lon){
  if(!ulat)return null;
  const a=(lat-ulat)*Math.PI/180, b=(lon-ulon)*Math.PI/180;
  const c=Math.sin(a/2)**2+Math.cos(ulat*Math.PI/180)*Math.cos(lat*Math.PI/180)*Math.sin(b/2)**2;
  return Math.round(6371000*2*Math.asin(Math.sqrt(c)));
}
function fmtD(m){return m===null?'':(m<1000?m+'м':(m/1000).toFixed(1)+'км');}
function fmtCar(m){if(!m)return'';const t=Math.round(m/500);return(t<1?1:t)+' мин';}
function fmtWalk(m){if(!m)return'';const t=Math.round(m/80);return t>59?Math.floor(t/60)+'ч '+t%60+'м':t+' мин';}

function initMap() {
  if (minit) return; minit = true;
  const f = document.getElementById('mframe');
  f.src = 'https://www.openstreetmap.org/export/embed.html?bbox=69.15,41.26,69.35,41.36&layer=mapnik';
  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(p => {
      ulat = p.coords.latitude; ulon = p.coords.longitude;
      const d = .025;
      f.src = `https://www.openstreetmap.org/export/embed.html?bbox=${ulon-d},${ulat-d},${ulon+d},${ulat+d}&layer=mapnik&marker=${ulat},${ulon}`;
    }, () => {}, { timeout: 7000 });
  }
}

function zoomTo(lat, lon) {
  const d = .006;
  document.getElementById('mframe').src =
    `https://www.openstreetmap.org/export/embed.html?bbox=${lon-d},${lat-d},${lon+d},${lat+d}&layer=mapnik&marker=${lat},${lon}`;
}

async function doSearch() {
  const q = document.getElementById('mq').value.trim(); if (!q) return;
  // Снимаем активный класс с категорий
  document.querySelectorAll('.cat').forEach(c => c.classList.remove('active'));
  loading(q);
  const loc = ulat ? `&viewbox=${ulon-.14},${ulat+.14},${ulon+.14},${ulat-.14}&bounded=0` : '';
  try {
    const r = await fetch(
      `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q)}&format=jsonv2&limit=8&accept-language=ru,uz&addressdetails=1${loc}`,
      { headers: { 'User-Agent': 'AIAgentBot/1.0', 'Accept-Language': 'ru' } }
    );
    if (!r.ok) throw new Error('Сервер ' + r.status);
    renderCards(await r.json());
  } catch(e) { showEmpty('Ошибка: ' + e.message); }
}

async function byCat(query, label, type, btn) {
  // Активируем кнопку
  document.querySelectorAll('.cat').forEach(c => c.classList.remove('active'));
  if (event?.target) event.target.classList.add('active');
  loading(label);

  let results = [];
  const terms = query.split(' ');

  for (const term of terms) {
    if (results.length >= 5) break;
    try {
      const bbox = ulat ? `&viewbox=${ulon-.07},${ulat+.07},${ulon+.07},${ulat-.07}&bounded=1` : '';
      const r = await fetch(
        `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(term)}&format=jsonv2&limit=8&accept-language=ru,uz&addressdetails=1${bbox}`,
        { headers: { 'User-Agent': 'AIAgentBot/1.0' } }
      );
      if (!r.ok) continue;
      const data = await r.json();
      for (const p of data) {
        const nm = p.name || p.display_name.split(',')[0];
        if (!results.find(x => (x.name || x.display_name.split(',')[0]) === nm))
          results.push(p);
      }
    } catch(e) {}
  }

  // Расширенный поиск если ничего не нашли
  if (!results.length) {
    try {
      const r = await fetch(
        `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(terms[0])}&format=jsonv2&limit=8&accept-language=ru,uz&addressdetails=1`,
        { headers: { 'User-Agent': 'AIAgentBot/1.0' } }
      );
      if (r.ok) results = await r.json();
    } catch(e) {}
  }

  if (!results.length) { showEmpty(label + ' не найдены — попробуй поиск'); return; }
  if (ulat) results.sort((a,b) => distM(+a.lat,+a.lon) - distM(+b.lat,+b.lon));
  renderCards(results.slice(0, 8), type);
}

function renderCards(data, typeHint) {
  if (!data?.length) { showEmpty('Ничего не найдено'); return; }
  document.getElementById('mres').innerHTML = data.map(p => {
    const lat = +p.lat, lon = +p.lon;
    const nm = p.name || p.display_name.split(',')[0];
    const t = (p.type || p.class || typeHint || '').toLowerCase();
    const icon = ICONS[t] || ICONS.default;
    const addr = p.address?.road || p.address?.suburb || p.address?.city_district
      || p.display_name.split(',').slice(1,3).join(', ') || '';
    const d = distM(lat, lon);
    const ya = ulat
      ? `https://yandex.ru/maps/?rtext=${ulat},${ulon}~${lat},${lon}&rtt=auto`
      : `https://yandex.ru/maps/?ll=${lon},${lat}&z=17`;
    const osm = ulat
      ? `https://www.openstreetmap.org/directions?engine=fossgis_osrm_car&route=${ulat},${ulon};${lat},${lon}`
      : `https://www.openstreetmap.org/?mlat=${lat}&mlon=${lon}#map=17/${lat}/${lon}`;

    return `<div class="place-card" onclick="zoomTo(${lat},${lon})">
      <div class="pc-icon">${icon}</div>
      <div class="pc-body">
        <div class="pc-name">${esc(nm)}</div>
        ${addr ? `<div class="pc-addr">${esc(addr.slice(0,55))}</div>` : ''}
        ${d !== null ? `<div class="pc-meta">
          <span class="chip dist">📍 ${fmtD(d)}</span>
          <span class="chip car">🚗 ${fmtCar(d)}</span>
          <span class="chip walk">🚶 ${fmtWalk(d)}</span>
        </div>` : ''}
        <div class="pc-btns">
          <a class="pc-btn main" href="${ya}" target="_blank">🗺 Яндекс</a>
          <a class="pc-btn sec"  href="${osm}" target="_blank">🔗 OSM</a>
        </div>
      </div>
    </div>`;
  }).join('');
  if (data[0]) zoomTo(+data[0].lat, +data[0].lon);
}

function loading(q) {
  document.getElementById('mres').innerHTML =
    `<div class="loader"><div class="spinner"></div><p>Ищу: ${esc(q)}</p></div>`;
}
function showEmpty(msg) {
  document.getElementById('mres').innerHTML =
    `<div class="empty"><div class="empty-icon">🔍</div><p>${esc(msg)}</p><small>Попробуй другой запрос</small></div>`;
}
