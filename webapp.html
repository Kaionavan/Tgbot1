<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AI Голосовой Агент</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap');
  :root {
    --bg: #0a0a0f; --surface: #13131a; --border: #1e1e2e;
    --accent: #7c6af7; --accent2: #f76ac8; --text: #e8e8f0;
    --muted: #5a5a7a; --green: #6af7c8;
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body {
    font-family: 'Syne', sans-serif; background: var(--bg); color: var(--text);
    height: 100vh; display: flex; flex-direction: column; overflow: hidden;
  }
  body::before {
    content:''; position:fixed; inset:0;
    background-image: linear-gradient(rgba(124,106,247,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(124,106,247,0.03) 1px, transparent 1px);
    background-size: 32px 32px; pointer-events:none; z-index:0;
  }
  .topbar {
    display:flex; align-items:center; justify-content:space-between;
    padding: 12px 20px; border-bottom: 1px solid var(--border);
    background: var(--surface); position:relative; z-index:10; flex-shrink:0;
  }
  .topbar-title {
    font-size:15px; font-weight:800;
    background: linear-gradient(135deg, var(--text), var(--accent));
    -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
  }
  .ai-badge {
    font-family:'Space Mono',monospace; font-size:9px; padding:3px 8px;
    border-radius:20px; border:1px solid var(--accent); color:var(--accent); letter-spacing:.1em;
  }
  .tts-toggle { display:flex; align-items:center; gap:6px; font-family:'Space Mono',monospace; font-size:9px; color:var(--muted); cursor:pointer; }
  .toggle-sw { width:28px; height:16px; border-radius:8px; background:var(--border); position:relative; transition:background .2s; }
  .toggle-sw.on { background:var(--accent); }
  .toggle-sw::after { content:''; position:absolute; width:12px; height:12px; border-radius:50%; background:white; top:2px; left:2px; transition:left .2s; }
  .toggle-sw.on::after { left:14px; }
  .chat { flex:1; overflow-y:auto; padding:16px; display:flex; flex-direction:column; gap:10px; scrollbar-width:none; position:relative; z-index:1; }
  .chat::-webkit-scrollbar { display:none; }
  .msg { max-width:82%; padding:10px 14px; border-radius:16px; font-size:14px; line-height:1.5; animation:msg-in .25s ease; word-break:break-word; }
  @keyframes msg-in { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
  .msg.user { align-self:flex-end; background:linear-gradient(135deg,var(--accent),var(--accent2)); color:white; border-bottom-right-radius:4px; }
  .msg.bot { align-self:flex-start; background:var(--surface); border:1px solid var(--border); border-bottom-left-radius:4px; }
  .msg.bot .lbl { font-family:'Space Mono',monospace; font-size:8px; color:var(--accent); letter-spacing:.2em; margin-bottom:5px; text-transform:uppercase; }
  .msg.speaking { border-color:var(--green); box-shadow:0 0 12px rgba(106,247,200,.2); }
  .typing { align-self:flex-start; background:var(--surface); border:1px solid var(--border); border-radius:16px; border-bottom-left-radius:4px; padding:12px 16px; display:flex; gap:4px; align-items:center; }
  .typing span { width:6px; height:6px; border-radius:50%; background:var(--accent); animation:bounce 1.2s ease-in-out infinite; }
  .typing span:nth-child(2){animation-delay:.2s;background:var(--accent2)}
  .typing span:nth-child(3){animation-delay:.4s}
  @keyframes bounce { 0%,60%,100%{transform:translateY(0);opacity:.4} 30%{transform:translateY(-6px);opacity:1} }
  .controls {
    padding:16px 20px 28px; background:var(--surface); border-top:1px solid var(--border);
    display:flex; flex-direction:column; align-items:center; gap:12px;
    position:relative; z-index:10; flex-shrink:0;
  }
  .orb-wrap { position:relative; width:80px; height:80px; display:flex; align-items:center; justify-content:center; }
  .orb-ring { position:absolute; border-radius:50%; border:1px solid transparent; }
  .orb-ring:nth-child(1) { width:80px; height:80px; border-top-color:var(--accent); animation:spin 4s linear infinite; }
  .orb-ring:nth-child(2) { width:65px; height:65px; border-right-color:var(--accent2); animation:spin 3s linear infinite reverse; }
  @keyframes spin { to{transform:rotate(360deg)} }
  .orb {
    width:56px; height:56px; border-radius:50%; background:linear-gradient(135deg,var(--accent),var(--accent2));
    display:flex; align-items:center; justify-content:center; cursor:pointer;
    box-shadow:0 0 20px rgba(124,106,247,.4); transition:all .2s ease;
    position:relative; z-index:2; border:none; outline:none;
  }
  .orb:active{transform:scale(.92)}
  .orb.recording{background:linear-gradient(135deg,#ff4a4a,#f76ac8);animation:pulse-orb 1s ease-in-out infinite}
  .orb.processing{background:linear-gradient(135deg,var(--green),var(--accent))}
  .orb.speaking{background:linear-gradient(135deg,var(--green),#4af7b0)}
  @keyframes pulse-orb{0%,100%{box-shadow:0 0 20px rgba(255,74,74,.4)}50%{box-shadow:0 0 40px rgba(255,74,74,.7)}}
  .orb svg{width:22px;height:22px;fill:white;pointer-events:none}
  .waveform{display:flex;align-items:center;gap:2px;height:24px;opacity:0;transition:opacity .3s}
  .waveform.show{opacity:1}
  .wb{width:3px;border-radius:2px;background:linear-gradient(to top,var(--accent),var(--accent2));animation:wv .6s ease-in-out infinite;min-height:3px}
  .wb:nth-child(1){animation-delay:0s}.wb:nth-child(2){animation-delay:.1s}.wb:nth-child(3){animation-delay:.2s}
  .wb:nth-child(4){animation-delay:.05s}.wb:nth-child(5){animation-delay:.15s}.wb:nth-child(6){animation-delay:.25s}
  .wb:nth-child(7){animation-delay:.1s}.wb:nth-child(8){animation-delay:.2s}
  @keyframes wv{0%,100%{height:3px}50%{height:20px}}
  .hint{font-family:'Space Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;text-align:center}
  .input-row{display:flex;gap:8px;width:100%;align-items:flex-end}
  textarea{flex:1;background:var(--bg);border:1px solid var(--border);border-radius:12px;padding:10px 14px;color:var(--text);font-family:'Space Mono',monospace;font-size:12px;resize:none;outline:none;max-height:80px;min-height:40px;line-height:1.4;transition:border-color .2s}
  textarea::placeholder{color:var(--muted)}
  textarea:focus{border-color:var(--accent)}
  .send-btn{width:40px;height:40px;border-radius:10px;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:transform .15s}
  .send-btn:active{transform:scale(.88)}
  .send-btn svg{width:16px;height:16px;fill:white}
  .err{font-family:'Space Mono',monospace;font-size:10px;color:#ff6b6b;text-align:center;min-height:16px}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-title">AI Агент</div>
  <div class="ai-badge" id="ai-badge">GROQ</div>
  <div class="tts-toggle" onclick="toggleTTS()">
    <span>Голос</span>
    <div class="toggle-sw on" id="tts-sw"></div>
  </div>
</div>

<div class="chat" id="chat"></div>

<div class="controls">
  <div class="waveform" id="waveform">
    <div class="wb"></div><div class="wb"></div><div class="wb"></div>
    <div class="wb"></div><div class="wb"></div><div class="wb"></div>
    <div class="wb"></div><div class="wb"></div>
  </div>

  <div class="orb-wrap">
    <div class="orb-ring"></div>
    <div class="orb-ring"></div>
    <button class="orb" id="orb" onclick="handleOrb()">
      <svg id="orb-icon" viewBox="0 0 24 24">
        <path d="M12 1a4 4 0 0 1 4 4v6a4 4 0 0 1-8 0V5a4 4 0 0 1 4-4zm-2 4v6a2 2 0 1 0 4 0V5a2 2 0 1 0-4 0zm-3 6a5 5 0 0 0 10 0h2a7 7 0 0 1-6 6.92V20h3v2H8v-2h3v-2.08A7 7 0 0 1 5 11h2z"/>
      </svg>
    </button>
  </div>

  <div class="hint" id="hint">Нажми чтобы говорить</div>

  <div class="input-row">
    <textarea id="txt" placeholder="Или напиши..." rows="1"
      onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button class="send-btn" onclick="sendText()">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>

  <div class="err" id="err"></div>
</div>

<script>
const tg = window.Telegram?.WebApp;
if (tg) { tg.ready(); tg.expand(); tg.setBackgroundColor('#0a0a0f'); tg.setHeaderColor('#13131a'); }

// =============================================
// ПОЛУЧЕНИЕ GROQ КЛЮЧА - несколько способов
// =============================================
function getGroqKey() {
  // Способ 1: Из hash-фрагмента URL (#groq=KEY) — основной способ
  const hash = window.location.hash.substring(1);
  const hashParams = new URLSearchParams(hash);
  if (hashParams.get('groq')) return hashParams.get('groq');
  
  // Способ 2: Из query-параметров (?groq=KEY) — старый способ
  const queryParams = new URLSearchParams(window.location.search);
  if (queryParams.get('groq')) return queryParams.get('groq');
  
  // Способ 3: Из Telegram initData startParam
  try {
    const initData = tg?.initDataUnsafe;
    if (initData?.start_param) {
      const sp = new URLSearchParams(initData.start_param);
      if (sp.get('groq')) return sp.get('groq');
    }
  } catch(e) {}
  
  return '';
}

const GROQ_KEY = getGroqKey();

// Показываем статус ключа в badge
document.addEventListener('DOMContentLoaded', () => {
  const badge = document.getElementById('ai-badge');
  if (badge) {
    badge.textContent = GROQ_KEY ? 'GROQ ✓' : 'NO KEY';
    badge.style.borderColor = GROQ_KEY ? '#6af7c8' : '#ff6b6b';
    badge.style.color = GROQ_KEY ? '#6af7c8' : '#ff6b6b';
  }
});

let isRecording = false, isProcessing = false;
let mediaRecorder = null, audioChunks = [];
let ttsOn = true, history = [], curAudio = null;

function toggleTTS() {
  ttsOn = !ttsOn;
  document.getElementById('tts-sw').className = 'toggle-sw' + (ttsOn ? ' on' : '');
  if (!ttsOn && curAudio) { curAudio.pause(); curAudio = null; }
  if (!ttsOn) speechSynthesis?.cancel();
}

function handleOrb() {
  if (isProcessing) return;
  isRecording ? stopRec() : startRec();
}

async function startRec() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    const opts = MediaRecorder.isTypeSupported('audio/webm;codecs=opus') ? { mimeType: 'audio/webm;codecs=opus' } : {};
    mediaRecorder = new MediaRecorder(stream, opts);
    audioChunks = [];
    mediaRecorder.ondataavailable = e => e.data.size > 0 && audioChunks.push(e.data);
    mediaRecorder.onstop = async () => {
      stream.getTracks().forEach(t => t.stop());
      await processVoice(new Blob(audioChunks, { type: mediaRecorder.mimeType || 'audio/webm' }));
    };
    mediaRecorder.start(100);
    isRecording = true;
    orbState('recording'); hint('Говори... нажми чтобы остановить');
    document.getElementById('waveform').classList.add('show');
  } catch(e) { err('Нет доступа к микрофону'); }
}

function stopRec() {
  if (mediaRecorder && isRecording) {
    mediaRecorder.stop(); isRecording = false; isProcessing = true;
    orbState('processing'); hint('Распознаю...');
    document.getElementById('waveform').classList.remove('show');
  }
}

async function processVoice(blob) {
  const text = await stt(blob);
  if (!text) { err('Не распознал речь, попробуй ещё раз'); resetOrb(); return; }
  addMsg('user', '🎤 ' + text);
  await aiReply(text);
}

async function stt(blob) {
  if (!GROQ_KEY) return null;
  try {
    const fd = new FormData();
    fd.append('file', blob, 'audio.webm');
    fd.append('model', 'whisper-large-v3');
    fd.append('language', 'ru');
    fd.append('response_format', 'json');
    const r = await fetch('https://api.groq.com/openai/v1/audio/transcriptions', {
      method: 'POST', headers: { 'Authorization': 'Bearer ' + GROQ_KEY }, body: fd
    });
    const d = await r.json();
    return d.text?.trim() || null;
  } catch(e) { return null; }
}

async function aiReply(text) {
  orbState('processing'); hint('Думаю...');
  showTyping();
  history.push({ role: 'user', content: text });
  if (history.length > 16) history = history.slice(-16);

  let reply = null;
  try {
    if (GROQ_KEY) {
      const r = await fetch('https://api.groq.com/openai/v1/chat/completions', {
        method: 'POST',
        headers: { 'Authorization': 'Bearer ' + GROQ_KEY, 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'llama-3.3-70b-versatile',
          messages: [
            { role: 'system', content: 'Ты персональный AI-агент. Обращайся к пользователю уважительно — господин. Отвечай кратко (2-3 предложения) так как ответ озвучивается голосом. Говори на русском.' },
            ...history.slice(-10)
          ],
          max_tokens: 250, temperature: 0.7
        })
      });
      const d = await r.json();
      reply = d?.choices?.[0]?.message?.content || null;
    } else {
      // Нет Groq ключа — используем Anthropic Claude API напрямую из webapp
      try {
        const r2 = await fetch('https://api.anthropic.com/v1/messages', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            model: 'claude-sonnet-4-20250514',
            max_tokens: 300,
            system: 'Ты персональный AI-агент. Обращайся к пользователю: господин. Отвечай кратко (2-3 предложения) — ответ озвучивается голосом. Говори на русском.',
            messages: history.slice(-10)
          })
        });
        const d2 = await r2.json();
        reply = d2?.content?.[0]?.text || null;
      } catch(e2) {
        reply = 'Скажи своему боту добавить GROQ_API_KEY в переменные окружения на Railway.';
      }
    }
  } catch(e) { reply = 'Ошибка соединения. Попробуй ещё раз.'; }

  hideTyping();
  if (reply) {
    history.push({ role: 'assistant', content: reply });
    const el = addMsg('bot', reply);
    if (ttsOn) await speak(reply, el);
  }
  resetOrb();
}

async function speak(text, el) {
  if (curAudio) { curAudio.pause(); curAudio = null; }
  orbState('speaking'); hint('Говорю...');
  if (el) el.classList.add('speaking');

  // Пробуем Groq TTS
  if (GROQ_KEY) {
    try {
      const r = await fetch('https://api.groq.com/openai/v1/audio/speech', {
        method: 'POST',
        headers: { 'Authorization': 'Bearer ' + GROQ_KEY, 'Content-Type': 'application/json' },
        body: JSON.stringify({ model: 'playai-tts', input: text.slice(0, 400), voice: 'Arista-PlayAI', response_format: 'mp3' })
      });
      if (r.ok) {
        const url = URL.createObjectURL(await r.blob());
        curAudio = new Audio(url);
        await new Promise(res => { curAudio.onended = res; curAudio.onerror = res; curAudio.play(); });
        if (el) el.classList.remove('speaking');
        return;
      }
    } catch(e) {}
  }

  // Fallback — браузерный TTS
  await new Promise(res => {
    if (!window.speechSynthesis) { res(); return; }
    speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'ru-RU'; u.rate = 1.0;
    const voices = speechSynthesis.getVoices();
    const rv = voices.find(v => v.lang.startsWith('ru'));
    if (rv) u.voice = rv;
    u.onend = res; u.onerror = res;
    speechSynthesis.speak(u);
  });
  if (el) el.classList.remove('speaking');
}

async function sendText() {
  const el = document.getElementById('txt');
  const text = el.value.trim();
  if (!text || isProcessing) return;
  el.value = ''; autoResize(el);
  isProcessing = true;
  addMsg('user', text);
  await aiReply(text);
}

function handleKey(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendText(); } }

// UI helpers
function orbState(s) {
  const orb = document.getElementById('orb');
  const icon = document.getElementById('orb-icon');
  orb.className = 'orb ' + s;
  const ic = {
    recording: '<rect x="7" y="7" width="10" height="10" rx="2"/>',
    processing: '<path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83" stroke="white" stroke-width="2" fill="none" stroke-linecap="round"/>',
    speaking: '<path d="M11 5L6 9H2v6h4l5 4V5zm4.54 0a8 8 0 0 1 0 14M15.54 8.46a4 4 0 0 1 0 7.07"/>',
    '': '<path d="M12 1a4 4 0 0 1 4 4v6a4 4 0 0 1-8 0V5a4 4 0 0 1 4-4zm-2 4v6a2 2 0 1 0 4 0V5a2 2 0 1 0-4 0zm-3 6a5 5 0 0 0 10 0h2a7 7 0 0 1-6 6.92V20h3v2H8v-2h3v-2.08A7 7 0 0 1 5 11h2z"/>'
  };
  icon.innerHTML = ic[s] || ic[''];
}

function resetOrb() { isProcessing = false; orbState(''); hint('Нажми чтобы говорить'); document.getElementById('waveform').classList.remove('show'); }
function hint(t) { document.getElementById('hint').textContent = t; }
function err(m) { const e = document.getElementById('err'); e.textContent = m; setTimeout(() => e.textContent = '', 3000); }

function addMsg(role, text) {
  const chat = document.getElementById('chat');
  const d = document.createElement('div');
  d.className = 'msg ' + role;
  d.innerHTML = role === 'bot' ? '<div class="lbl">▸ AI AGENT</div>' + esc(text) : esc(text);
  chat.appendChild(d);
  chat.scrollTop = chat.scrollHeight;
  return d;
}

let typEl = null;
function showTyping() {
  hideTyping();
  const c = document.getElementById('chat');
  typEl = document.createElement('div');
  typEl.className = 'typing';
  typEl.innerHTML = '<span></span><span></span><span></span>';
  c.appendChild(typEl); c.scrollTop = c.scrollHeight;
}
function hideTyping() { if (typEl) { typEl.remove(); typEl = null; } }

function autoResize(el) { el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight, 80) + 'px'; }
function esc(t) { return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>'); }

// Init
if (window.speechSynthesis) speechSynthesis.getVoices();

setTimeout(() => {
  const msg = GROQ_KEY
    ? 'Господин, я готов! Нажмите орб чтобы говорить со мной.'
    : 'Привет! Голосовой агент активен. Нажмите орб или напишите текстом — я отвечу!';
  addMsg('bot', msg);
  if (ttsOn && GROQ_KEY) speak(msg, document.querySelector('.msg.bot'));
  else if (ttsOn && !GROQ_KEY && window.speechSynthesis) {
    const u = new SpeechSynthesisUtterance(msg);
    u.lang = 'ru-RU';
    window.speechSynthesis.speak(u);
  }
}, 700);

function browserTTS(t) {
  if (!window.speechSynthesis) return;
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(t);
  u.lang = 'ru-RU';
  speechSynthesis.speak(u);
}
</script>
</body>
</html>
