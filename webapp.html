<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>AI Голосовой Агент</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;700;800&display=swap');

  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --border: #1e1e2e;
    --accent: #7c6af7;
    --accent2: #f76ac8;
    --text: #e8e8f0;
    --muted: #5a5a7a;
    --glow: rgba(124, 106, 247, 0.3);
    --glow2: rgba(247, 106, 200, 0.2);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'Syne', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
    position: relative;
  }

  /* Animated background grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(124,106,247,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(124,106,247,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* Ambient glows */
  body::after {
    content: '';
    position: fixed;
    top: -20%;
    left: 50%;
    transform: translateX(-50%);
    width: 600px;
    height: 400px;
    background: radial-gradient(ellipse, rgba(124,106,247,0.12) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    width: 100%;
    max-width: 420px;
    padding: 24px 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 28px;
    position: relative;
    z-index: 1;
  }

  /* Header */
  .header {
    text-align: center;
    width: 100%;
  }

  .header-label {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.3em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 8px;
    opacity: 0.8;
  }

  .header h1 {
    font-size: 26px;
    font-weight: 800;
    background: linear-gradient(135deg, var(--text) 0%, var(--accent) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1.1;
  }

  .header p {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    margin-top: 6px;
  }

  /* Orb - main voice button */
  .orb-container {
    position: relative;
    width: 180px;
    height: 180px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
  }

  .orb-ring {
    position: absolute;
    border-radius: 50%;
    border: 1px solid transparent;
    animation: rotate 8s linear infinite;
  }

  .orb-ring:nth-child(1) {
    width: 180px; height: 180px;
    border-color: rgba(124,106,247,0.2);
    border-top-color: var(--accent);
  }

  .orb-ring:nth-child(2) {
    width: 155px; height: 155px;
    border-color: rgba(247,106,200,0.15);
    border-right-color: var(--accent2);
    animation-direction: reverse;
    animation-duration: 5s;
  }

  .orb-ring:nth-child(3) {
    width: 130px; height: 130px;
    border-color: rgba(124,106,247,0.1);
    border-bottom-color: rgba(124,106,247,0.5);
    animation-duration: 12s;
  }

  @keyframes rotate {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }

  .orb-core {
    width: 100px;
    height: 100px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow:
      0 0 30px var(--glow),
      0 0 60px var(--glow2),
      inset 0 1px 0 rgba(255,255,255,0.2);
    transition: all 0.3s ease;
    position: relative;
    z-index: 2;
  }

  .orb-core svg {
    width: 36px;
    height: 36px;
    fill: white;
    transition: transform 0.3s ease;
  }

  .orb-container:active .orb-core {
    transform: scale(0.94);
    box-shadow: 0 0 50px var(--glow), 0 0 100px var(--glow2);
  }

  /* Recording state */
  .orb-container.recording .orb-core {
    animation: pulse-orb 1s ease-in-out infinite;
    background: linear-gradient(135deg, #f76ac8 0%, #ff4a4a 100%);
  }

  .orb-container.recording .orb-ring:nth-child(1) {
    animation: rotate 2s linear infinite;
    border-top-color: #ff4a4a;
  }

  @keyframes pulse-orb {
    0%, 100% { box-shadow: 0 0 30px rgba(247,106,200,0.4), 0 0 60px rgba(255,74,74,0.2); }
    50% { box-shadow: 0 0 60px rgba(247,106,200,0.7), 0 0 120px rgba(255,74,74,0.4); }
  }

  /* Processing state */
  .orb-container.processing .orb-core {
    animation: spin-glow 1s linear infinite;
    background: linear-gradient(135deg, #6af7c8 0%, var(--accent) 100%);
  }

  @keyframes spin-glow {
    from { filter: hue-rotate(0deg); }
    to { filter: hue-rotate(360deg); }
  }

  /* Status text */
  .status-text {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    text-align: center;
    letter-spacing: 0.05em;
    min-height: 20px;
    transition: color 0.3s ease;
  }

  .status-text.active { color: var(--accent); }
  .status-text.recording { color: #ff4a4a; }
  .status-text.processing { color: #6af7c8; }

  /* Waveform visualizer */
  .waveform {
    display: flex;
    align-items: center;
    gap: 3px;
    height: 40px;
    opacity: 0;
    transition: opacity 0.3s ease;
  }

  .waveform.visible { opacity: 1; }

  .wave-bar {
    width: 3px;
    border-radius: 3px;
    background: linear-gradient(to top, var(--accent), var(--accent2));
    animation: wave 0.8s ease-in-out infinite;
    min-height: 4px;
  }

  .wave-bar:nth-child(1) { animation-delay: 0s; }
  .wave-bar:nth-child(2) { animation-delay: 0.1s; }
  .wave-bar:nth-child(3) { animation-delay: 0.2s; }
  .wave-bar:nth-child(4) { animation-delay: 0.3s; }
  .wave-bar:nth-child(5) { animation-delay: 0.15s; }
  .wave-bar:nth-child(6) { animation-delay: 0.05s; }
  .wave-bar:nth-child(7) { animation-delay: 0.25s; }
  .wave-bar:nth-child(8) { animation-delay: 0.1s; }
  .wave-bar:nth-child(9) { animation-delay: 0.2s; }
  .wave-bar:nth-child(10) { animation-delay: 0s; }
  .wave-bar:nth-child(11) { animation-delay: 0.15s; }
  .wave-bar:nth-child(12) { animation-delay: 0.3s; }

  @keyframes wave {
    0%, 100% { height: 4px; }
    50% { height: 32px; }
  }

  /* Chat area */
  .chat-area {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 12px;
    max-height: 320px;
    overflow-y: auto;
    scrollbar-width: none;
    padding: 4px 0;
  }

  .chat-area::-webkit-scrollbar { display: none; }

  .message {
    max-width: 85%;
    padding: 12px 16px;
    border-radius: 16px;
    font-size: 14px;
    line-height: 1.5;
    animation: msg-in 0.3s ease;
  }

  @keyframes msg-in {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .message.user {
    align-self: flex-end;
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
    color: white;
    border-bottom-right-radius: 4px;
    font-family: 'Space Mono', monospace;
    font-size: 12px;
  }

  .message.bot {
    align-self: flex-start;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    border-bottom-left-radius: 4px;
  }

  .message.bot .msg-label {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    color: var(--accent);
    letter-spacing: 0.2em;
    margin-bottom: 6px;
    text-transform: uppercase;
  }

  /* Text input area */
  .input-area {
    width: 100%;
    display: flex;
    gap: 10px;
    align-items: flex-end;
  }

  .text-input {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 12px 16px;
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    resize: none;
    outline: none;
    transition: border-color 0.2s ease;
    max-height: 100px;
    min-height: 44px;
    line-height: 1.4;
  }

  .text-input::placeholder { color: var(--muted); }
  .text-input:focus { border-color: var(--accent); }

  .send-btn {
    width: 44px;
    height: 44px;
    border-radius: 12px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: transform 0.2s ease, opacity 0.2s ease;
    box-shadow: 0 4px 15px var(--glow);
  }

  .send-btn:active { transform: scale(0.9); }
  .send-btn svg { width: 18px; height: 18px; fill: white; }

  /* AI chips */
  .ai-chips {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    justify-content: center;
    width: 100%;
  }

  .chip {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.1em;
    padding: 4px 10px;
    border-radius: 20px;
    border: 1px solid var(--border);
    color: var(--muted);
    text-transform: uppercase;
  }

  .chip.active {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(124,106,247,0.1);
  }

  /* Divider */
  .divider {
    width: 100%;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--border), transparent);
  }

  /* Speak button label */
  .orb-label {
    font-size: 13px;
    font-weight: 700;
    color: var(--muted);
    letter-spacing: 0.05em;
    text-transform: uppercase;
    margin-top: -10px;
  }

  /* Typing indicator */
  .typing {
    display: flex;
    gap: 4px;
    padding: 12px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    border-bottom-left-radius: 4px;
    align-self: flex-start;
    align-items: center;
  }

  .typing span {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent);
    animation: typing-dot 1.2s ease-in-out infinite;
  }

  .typing span:nth-child(2) { animation-delay: 0.2s; background: var(--accent2); }
  .typing span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes typing-dot {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
    30% { transform: translateY(-6px); opacity: 1; }
  }
</style>
</head>
<body>
<div class="container">

  <!-- Header -->
  <div class="header">
    <div class="header-label">▸ Personal AI Agent</div>
    <h1>Голосовой<br>Ассистент</h1>
    <p>// Нажми орб или напиши</p>
  </div>

  <!-- AI status chips -->
  <div class="ai-chips">
    <div class="chip active" id="chip-groq">● Groq</div>
    <div class="chip" id="chip-openrouter">○ OpenRouter</div>
    <div class="chip" id="chip-cohere">○ Cohere</div>
    <div class="chip" id="chip-gemini">○ Gemini</div>
  </div>

  <!-- Orb -->
  <div class="orb-container" id="orb" onclick="toggleRecording()">
    <div class="orb-ring"></div>
    <div class="orb-ring"></div>
    <div class="orb-ring"></div>
    <div class="orb-core">
      <!-- Mic icon -->
      <svg id="orb-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 1a4 4 0 0 1 4 4v6a4 4 0 0 1-8 0V5a4 4 0 0 1 4-4zm-2 4v6a2 2 0 1 0 4 0V5a2 2 0 1 0-4 0zm-3 6a5 5 0 0 0 10 0h2a7 7 0 0 1-6 6.92V20h3v2H8v-2h3v-2.08A7 7 0 0 1 5 11h2z"/>
      </svg>
    </div>
  </div>

  <div class="orb-label">Удержи для записи</div>

  <!-- Waveform -->
  <div class="waveform" id="waveform">
    <div class="wave-bar" style="height:12px"></div>
    <div class="wave-bar" style="height:20px"></div>
    <div class="wave-bar" style="height:8px"></div>
    <div class="wave-bar" style="height:28px"></div>
    <div class="wave-bar" style="height:16px"></div>
    <div class="wave-bar" style="height:32px"></div>
    <div class="wave-bar" style="height:20px"></div>
    <div class="wave-bar" style="height:24px"></div>
    <div class="wave-bar" style="height:10px"></div>
    <div class="wave-bar" style="height:28px"></div>
    <div class="wave-bar" style="height:18px"></div>
    <div class="wave-bar" style="height:14px"></div>
  </div>

  <!-- Status -->
  <div class="status-text" id="status">Нажми на орб чтобы говорить</div>

  <div class="divider"></div>

  <!-- Chat -->
  <div class="chat-area" id="chat"></div>

  <!-- Text input -->
  <div class="input-area">
    <textarea
      class="text-input"
      id="text-input"
      placeholder="Или напиши сообщение..."
      rows="1"
      onkeydown="handleKey(event)"
      oninput="autoResize(this)"
    ></textarea>
    <button class="send-btn" onclick="sendText()">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>

</div>

<script>
  // Telegram WebApp init
  const tg = window.Telegram?.WebApp;
  if (tg) {
    tg.ready();
    tg.expand();
    tg.setHeaderColor('#0a0a0f');
    tg.setBackgroundColor('#0a0a0f');
  }

  // State
  let isRecording = false;
  let mediaRecorder = null;
  let audioChunks = [];
  let isProcessing = false;

  // BOT API URL — сюда будем отправлять данные через бота
  // Используем Telegram sendData для передачи в бота
  const BOT_TOKEN = ''; // не нужен — используем tg.sendData

  function setStatus(text, type = '') {
    const el = document.getElementById('status');
    el.textContent = text;
    el.className = 'status-text ' + type;
  }

  function setOrbState(state) {
    const orb = document.getElementById('orb');
    const icon = document.getElementById('orb-icon');
    const waveform = document.getElementById('waveform');
    orb.className = 'orb-container ' + state;

    if (state === 'recording') {
      waveform.classList.add('visible');
      // Stop icon
      icon.innerHTML = '<rect x="6" y="6" width="12" height="12" rx="2"/>';
      setStatus('● Запись... нажми чтобы остановить', 'recording');
    } else if (state === 'processing') {
      waveform.classList.remove('visible');
      // Loading icon
      icon.innerHTML = '<path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83" stroke="white" stroke-width="2" fill="none" stroke-linecap="round"/>';
      setStatus('⟳ Обрабатываю...', 'processing');
    } else {
      waveform.classList.remove('visible');
      // Mic icon
      icon.innerHTML = '<path d="M12 1a4 4 0 0 1 4 4v6a4 4 0 0 1-8 0V5a4 4 0 0 1 4-4zm-2 4v6a2 2 0 1 0 4 0V5a2 2 0 1 0-4 0zm-3 6a5 5 0 0 0 10 0h2a7 7 0 0 1-6 6.92V20h3v2H8v-2h3v-2.08A7 7 0 0 1 5 11h2z"/>';
      setStatus('Нажми на орб чтобы говорить');
    }
  }

  async function toggleRecording() {
    if (isProcessing) return;

    if (!isRecording) {
      await startRecording();
    } else {
      stopRecording();
    }
  }

  async function startRecording() {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      mediaRecorder = new MediaRecorder(stream);
      audioChunks = [];

      mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
      mediaRecorder.onstop = async () => {
        const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
        await processVoice(audioBlob);
        stream.getTracks().forEach(t => t.stop());
      };

      mediaRecorder.start();
      isRecording = true;
      setOrbState('recording');

    } catch (e) {
      setStatus('❌ Нет доступа к микрофону', '');
      console.error(e);
    }
  }

  function stopRecording() {
    if (mediaRecorder && isRecording) {
      mediaRecorder.stop();
      isRecording = false;
      isProcessing = true;
      setOrbState('processing');
    }
  }

  async function processVoice(audioBlob) {
    try {
      // Конвертируем в base64
      const reader = new FileReader();
      reader.onloadend = async () => {
        const base64 = reader.result.split(',')[1];

        // Отправляем в Telegram бот через sendData
        const payload = JSON.stringify({
          type: 'voice',
          data: base64,
          format: 'webm'
        });

        if (tg) {
          // Показываем сообщение пользователя
          addMessage('user', '🎤 Голосовое сообщение');
          showTyping();

          // Отправляем данные в бота
          tg.sendData(payload);

          // Имитируем ответ (реальный придёт через бота в TG чат)
          setTimeout(() => {
            hideTyping();
            addMessage('bot', 'Голосовое отправлено в чат! Ответ придёт в Telegram.');
            isProcessing = false;
            setOrbState('');
          }, 1500);
        } else {
          // Dev mode — показываем что записали
          addMessage('user', '🎤 Голосовое записано (' + Math.round(audioBlob.size/1024) + ' KB)');
          isProcessing = false;
          setOrbState('');
        }
      };
      reader.readAsDataURL(audioBlob);

    } catch (e) {
      console.error(e);
      isProcessing = false;
      setOrbState('');
      setStatus('❌ Ошибка обработки', '');
    }
  }

  function addMessage(role, text) {
    const chat = document.getElementById('chat');

    const div = document.createElement('div');
    div.className = 'message ' + role;

    if (role === 'bot') {
      div.innerHTML = '<div class="msg-label">▸ AI Agent</div>' + escapeHtml(text);
    } else {
      div.textContent = text;
    }

    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
  }

  let typingEl = null;
  function showTyping() {
    const chat = document.getElementById('chat');
    typingEl = document.createElement('div');
    typingEl.className = 'typing';
    typingEl.innerHTML = '<span></span><span></span><span></span>';
    chat.appendChild(typingEl);
    chat.scrollTop = chat.scrollHeight;
  }

  function hideTyping() {
    if (typingEl) {
      typingEl.remove();
      typingEl = null;
    }
  }

  async function sendText() {
    const input = document.getElementById('text-input');
    const text = input.value.trim();
    if (!text) return;

    input.value = '';
    autoResize(input);
    addMessage('user', text);
    showTyping();

    if (tg) {
      // Отправляем текст в бота
      tg.sendData(JSON.stringify({ type: 'text', message: text }));
      setTimeout(() => {
        hideTyping();
        addMessage('bot', 'Сообщение отправлено в чат! Ответ придёт в Telegram.');
      }, 800);
    } else {
      // Dev fallback
      setTimeout(() => {
        hideTyping();
        addMessage('bot', 'Режим разработки — подключи к боту для реальных ответов.');
      }, 1000);
    }
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendText();
    }
  }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 100) + 'px';
  }

  function escapeHtml(text) {
    return text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // Welcome message
  setTimeout(() => {
    addMessage('bot', 'Господин, добро пожаловать! Нажмите на орб чтобы говорить со мной голосом, или напишите текстом.');
  }, 500);
</script>
</body>
</html>
